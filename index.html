<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student List</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f4f7;
      color: #1f2937;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 16px; }
    .page-title { margin: 0 0 16px; font-size: 1.4rem; font-weight: 600; }
    .student-list { display: grid; gap: 16px; }
    .student-card {
      background: #fff; border: 1px solid #d1d5db; border-radius: 16px;
      overflow: hidden; box-shadow: 0 2px 8px rgba(15,23,42,0.06);
      display: grid; grid-template-columns: 1fr; gap: 1rem; padding: 16px;
    }
    .student-photo {
      background: #0f4c81; min-height: 220px; border-radius: 16px;
      display: grid; place-items: center; overflow: hidden;
    }
    .student-photo img {
      display: block; width: 100%; max-width: 260px; height: auto; object-fit: cover;
    }
    .info-grid { display: grid; gap: 6px; }
    .info-grid p { margin: 0; line-height: 1.5; font-size: 0.95rem; }
    .info-grid p span { font-weight: 600; display: inline-block; width: 80px; }

    .extra-details { display: none; }
    .extra-details p { margin: 0; line-height: 1.5; font-size: 0.95rem; }
    .extra-details p span { font-weight: 600; display: inline-block; width: 100px; }

    @media (min-width: 960px) {
      .student-card { grid-template-columns: 260px 1fr; align-items: start; }
      .extra-details { display: block; margin-top: 10px; padding-top: 10px; border-top: 1px solid #d1d5db; }
    }
  </style>
</head>

    function renderStudents(students) {
      var list = document.getElementById('studentList');
      list.innerHTML = '';
      for (var i = 0; i < students.length; i++) {
        var s = students[i];
        var card = document.createElement('article');
        card.className = 'student-card';

        var photo = document.createElement('div');
        photo.className = 'student-photo';
        var img = document.createElement('img');
        img.src = 'photos/' + s.division + '/' + s.gr + '.jpeg';
        img.alt = s.name + ' photo';
        img.onerror = function() { this.style.display = 'none'; };
        photo.appendChild(img);

        var info = document.createElement('div');
        info.className = 'info-grid';
        info.innerHTML = '<p><span>Name:</span> ' + s.name + '</p><p><span>Gr No:</span> ' + s.gr + '</p><p><span>Roll:</span> ' + s.roll + '</p><p><span>Class:</span> ' + s.division + (s.section ? ' - ' + s.section : '') + '</p>';

        var extra = document.createElement('div');
        extra.className = 'extra-details';
        extra.innerHTML = '<p><span>Email:</span> ' + s.email + '</p><p><span>Elective 1:</span> ' + s.elective1 + '</p><p><span>Elective 2:</span> ' + s.elective2 + '</p>';

        info.appendChild(extra);
        card.appendChild(photo);
        card.appendChild(info);
        list.appendChild(card);
      }
    }

    function applyFilter() {
      var div = document.getElementById('classFilter').value;
      var q = document.getElementById('searchInput').value.toLowerCase().trim();
      var filtered = allStudents.filter(function(s) {
        if (div !== 'all' && s.division !== div) return false;
        if (q) {
          var match = s.name.toLowerCase().indexOf(q) !== -1 ||
                      s.gr.indexOf(q) !== -1 ||
                      s.roll.toLowerCase().indexOf(q) !== -1 ||
                      s.email.toLowerCase().indexOf(q) !== -1 ||
                      s.division.toLowerCase().indexOf(q) !== -1 ||
                      (s.section && s.section.toLowerCase().indexOf(q) !== -1) ||
                      s.elective1.toLowerCase().indexOf(q) !== -1 ||
                      s.elective2.toLowerCase().indexOf(q) !== -1;
          if (!match) return false;
        }
        return true;
      });
      renderStudents(filtered);
    }

    var filter = document.getElementById('classFilter');
    var divisions = [...new Set(allStudents.map(function(s) { return s.division; }))].sort();
    divisions.forEach(function(d) {
      var opt = document.createElement('option');
      opt.value = d;
      opt.textContent = d;
      filter.appendChild(opt);
    });
    applyFilter();
  </script>
